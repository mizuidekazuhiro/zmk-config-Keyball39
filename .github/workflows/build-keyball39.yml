name: Build Keyball39

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shield: [keyball39_left, keyball39_right]

    steps:
      - name: Checkout ZMK Firmware
        uses: actions/checkout@v4
        with:
          repository: zmkfirmware/zmk
          path: zmk

      - name: Checkout Config
        uses: actions/checkout@v4
        with:
          path: zmk-config

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip ninja-build cmake gcc-arm-none-eabi
          python3 -m pip install --upgrade pip west

      - name: Initialize West
        run: |
          cd zmk
          west init -l app
          west update
          west zephyr-export

      - name: Build firmware
        run: |
          cd zmk
          west build -s app -b nice_nano -- -DZMK_CONFIG=../zmk-config/config -DSHIELD="${{ matrix.shield }}"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.shield }}-firmware"
          path: zmk/build/zephyr/zephyr.hex
